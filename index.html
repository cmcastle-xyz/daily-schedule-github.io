<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉桂狗日记本</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
  body{background:#fff9e6;padding:15px;min-height:100vh}
  .container{max-width:700px;margin:20px auto;background:#fff;border-radius:24px;padding:25px;box-shadow:0 8px 30px rgba(100,120,255,0.1)}
  .logo{text-align:center;font-size:50px;margin-bottom:10px}
  .title{text-align:center;color:#4a90ff;margin-bottom:6px}
  .subtitle{text-align:center;color:#ff85a2;margin-bottom:20px}
  
  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}
  .calendar-header{text-align:center;font-weight:bold;color:#4a90ff;padding:8px 0}
  .day{background:#f7f9ff;border-radius:12px;padding:12px;text-align:center;cursor:pointer;border:1px solid #eef5ff}
  .day.active{background:#4a90ff;color:white}
  .day:hover{background:#eef5ff}
  
  .btn{padding:10px 14px;background:#4a90ff;color:white;border:none;border-radius:12px;margin-top:10px}
  .pink{background:#ff85a2}
  .yellow{background:#ffd166;color:#333}
  
  .diary{display:none;margin-top:20px}
  .diary.active{display:block}
  .date-title{color:#4a90ff;margin-bottom:15px;text-align:center}
  
  textarea,input{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-bottom:10px}
  textarea{height:100px;resize:none}
  
  .preview{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .preview img{width:70px;height:70px;object-fit:cover;border-radius:10px}
  
  .plan-item{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .plan-text{flex:1}
  .progress-bar{width:100%;height:8px;background:#eee;border-radius:4px;margin-top:4px}
  .progress{height:8px;background:#4a90ff;border-radius:4px}
  
  .section{margin-bottom:20px;padding-top:10px}
  .nav{display:flex;gap:10px;margin-bottom:15px}
  .nav button{flex:1;padding:10px;border-radius:12px;border:none;background:#eef5ff;color:#4a90ff}

  .page{display:none}
  .page.active{display:block}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🐶</div>
  <h2 class="title">玉桂狗日记本</h2>
  <p class="subtitle">My Daily Diary</p>

  <div class="nav">
    <button onclick="showPage('calendar')">📅 日历主页</button>
    <button onclick="showPage('diary')">✏️ 写日记</button>
  </div>

  <div id="calendarPage" class="page active">
    <div class="calendar" id="calendar"></div>
  </div>

  <div id="diaryPage" class="page">
    <div id="diary" class="diary active">
      <h3 class="date-title" id="currentDate"></h3>

      <div class="section">
        <h4 style="margin-bottom:8px;color:#ff85a2">✏️ 今日记录</h4>
        <textarea id="content" placeholder="写下今天的心情..."></textarea>
        <input type="file" id="imgs" multiple accept="image/*">
        <div class="preview" id="preview"></div>
      </div>

      <div class="section">
        <h4 style="margin-bottom:8px;color:#ff85a2">📋 今日计划</h4>
        <input id="planInput" placeholder="输入计划，按回车添加">
        <div id="planList"></div>
      </div>

      <button class="btn" onclick="saveDiary()">💾 保存今日日记</button>
    </div>
  </div>
</div>

<script>
let today = new Date();
let currentViewDate = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,0)+'-'+String(today.getDate()).padStart(2,0);
let diaryData = JSON.parse(localStorage.getItem('diaryData')) || {};
let imgList = [];

window.onload = function(){
  renderCalendar();
  loadDiary(currentViewDate);
  showPage('calendar');
  
  document.getElementById('planInput').addEventListener('keypress',(e)=>{
    if(e.key==='Enter') addPlan();
  })

  document.getElementById('imgs').addEventListener('change',function(e){
    let files = e.target.files;
    imgList = [];
    document.getElementById('preview').innerHTML = '';
    for(let i=0;i<files.length;i++){
      let reader = new FileReader();
      reader.onload = function(ev){
        imgList.push(ev.target.result);
        let img = document.createElement('img');
        img.src = ev.target.result;
        document.getElementById('preview').appendChild(img);
      }
      reader.readAsDataURL(files[i]);
    }
  })
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(page==='calendar'){
    document.getElementById('calendarPage').classList.add('active');
  }else{
    document.getElementById('diaryPage').classList.add('active');
  }
}

function renderCalendar(){
  let cal = document.getElementById('calendar');
  cal.innerHTML = `
    <div class="calendar-header">日</div>
    <div class="calendar-header">一</div>
    <div class="calendar-header">二</div>
    <div class="calendar-header">三</div>
    <div class="calendar-header">四</div>
    <div class="calendar-header">五</div>
    <div class="calendar-header">六</div>
  `;
  let year = today.getFullYear();
  let month = today.getMonth();
  let firstDay = new Date(year,month,1).getDay();
  let daysInMonth = new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++) cal.innerHTML += `<div class="day" style="visibility:hidden"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    let dateStr = year+'-'+String(month+1).padStart(2,0)+'-'+String(d).padStart(2,0);
    cal.innerHTML += `<div class="day" onclick="openDay('${dateStr}')">${d}</div>`;
  }
}

function openDay(date){
  currentViewDate = date;
  showPage('diary');
  loadDiary(date);
}

function loadDiary(date){
  document.getElementById('currentDate').innerText = '🗓 '+date;
  let data = diaryData[date] || {content:'',imgs:[],plans:[]};
  document.getElementById('content').value = data.content || '';
  imgList = data.imgs || [];
  renderPreview();
  renderPlans();
}

function renderPreview(){
  let p = document.getElementById('preview');
  p.innerHTML = '';
  imgList.forEach(src=>{
    let img = document.createElement('img');
    img.src = src;
    p.appendChild(img);
  })
}

function addPlan(){
  let text = document.getElementById('planInput').value.trim();
  if(!text) return;
  if(!diaryData[currentViewDate]) diaryData[currentViewDate] = {content:'',imgs:[],plans:[]};
  diaryData[currentViewDate].plans.push({text,done:false});
  localStorage.setItem('diaryData',JSON.stringify(diaryData));
  document.getElementById('planInput').value = '';
  renderPlans();
}

function togglePlan(index){
  let data = diaryData[currentViewDate];
  data.plans[index].done = !data.plans[index].done;
  localStorage.setItem('diaryData',JSON.stringify(diaryData));
  renderPlans();
}

function renderPlans(){
  let data = diaryData[currentViewDate] || {plans:[]};
  let list = document.getElementById('planList');
  list.innerHTML = '';
  let total = data.plans?.length || 0;
  let done = data.plans?.filter(p=>p.done).length || 0;
  let percent = total===0 ? 0 : Math.round((done/total)*100);

  list.innerHTML += `
    <div style="margin-bottom:10px">
      <div class="progress-bar">
        <div class="progress" style="width:${percent}%"></div>
      </div>
      <div style="font-size:12px;color:#666;margin-top:4px">进度 ${done}/${total} (${percent}%)</div>
    </div>
  `;

  (data.plans || []).forEach((p,i)=>{
    list.innerHTML += `
      <div class="plan-item">
        <input type="checkbox" ${p.done?'checked':''} onclick="togglePlan(${i})">
        <div class="plan-text" style="${p.done?'text-decoration:line-through;color:#999':''}">${p.text}</div>
      </div>
    `;
  })
}

function saveDiary(){
  diaryData[currentViewDate] = {
    content: document.getElementById('content').value.trim(),
    imgs: imgList,
    plans: diaryData[currentViewDate]?.plans || []
  };
  localStorage.setItem('diaryData',JSON.stringify(diaryData));
  alert('✅ 保存成功！');
  renderPlans();
}
</script>
</body>
</html>
